services:
  nucpot-db:
    image: postgres:16-alpine
    container_name: nucpot-postgres
    environment:
      POSTGRES_USER: nucpot
      POSTGRES_PASSWORD: nucpot_dev
      POSTGRES_DB: nucpot
    ports:
      - "5432:5432"
    volumes:
      - nucpot-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nucpot"]
      interval: 5s
      timeout: 5s
      retries: 5

  verify-service:
    build:
      context: ./verify-service
      dockerfile: Dockerfile
    container_name: nucpot-verify
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://nucpot:nucpot_dev@nucpot-db:5432/nucpot"
      VERIFY_HOST: "0.0.0.0"
      VERIFY_PORT: "8000"
    depends_on:
      nucpot-db:
        condition: service_healthy
    volumes:
      - ./verify-service:/app
      - potential-files:/data/potentials

volumes:
  nucpot-pgdata:
  potential-files:
