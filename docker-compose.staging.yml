# =============================================================================
# NFM-DB — Staging deployment stack (NFM-111)
# =============================================================================
# Managed by scripts/staging_deploy.sh (deploy / status / rollback + health
# gate + auto-rollback). Bring env up via:
#   cp docker/.env.staging.example docker/.env.staging   # then fill secrets
#   ./scripts/staging_deploy.sh deploy
#
# Container names are prefixed `nucpot-staging-*` (the GitHub repo is
# `Etoile04/nucpot`) so `docker ps --filter name=nucpot-staging` shows the
# whole stack (NFM-112 acceptance contract). The API is the NFM-DB FastAPI app
# (apps/api); the web is the NFM-DB Next.js app (apps/web).
# See docs/deployment/staging-pipeline.md for the full runbook.
# =============================================================================

name: nucpot-staging

services:
  # ---- Bundled PostgreSQL 16 (staging database) ------------------------------
  db:
    image: postgres:16
    container_name: nucpot-staging-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${STAGING_POSTGRES_USER:-nfm}
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:?Set STAGING_POSTGRES_PASSWORD in docker/.env.staging}
      POSTGRES_DB: ${STAGING_POSTGRES_DB:-nfm_db}
    ports:
      - "${STAGING_DB_HOST_PORT:-5432}:5432"
    volumes:
      - staging-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAGING_POSTGRES_USER:-nfm} -d ${STAGING_POSTGRES_DB:-nfm_db}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks: [staging]

  # ---- NFM-DB FastAPI (staging API, /api/v1/health) --------------------------
  api:
    build:
      context: .
      dockerfile: docker/staging-api.Dockerfile
    image: nucpot-staging-api:${STAGING_IMAGE_TAG:-latest}
    container_name: nucpot-staging-api
    restart: unless-stopped
    ports:
      # NFM-112 contract: staging API reachable on the host at 127.0.0.1:8001
      - "${STAGING_API_HOST_PORT:-8001}:8000"
    environment:
      # Staging contract vars (STAGING_* prefix) mapped to the app's NFM_* env.
      NFM_DATABASE_URL: ${STAGING_DATABASE_URL:-postgresql+asyncpg://nfm:${STAGING_POSTGRES_PASSWORD:?Set STAGING_POSTGRES_PASSWORD}@nucpot-staging-db:5432/nfm_db}
      NFM_SECRET_KEY: ${STAGING_API_SECRET_KEY:?Set STAGING_API_SECRET_KEY in docker/.env.staging}
      NFM_CORS_ORIGINS: ${STAGING_CORS_ORIGINS:-["http://localhost:3000"]}
      NFM_DEBUG: ${STAGING_DEBUG:-false}
      NFM_ACCESS_TOKEN_EXPIRE_MINUTES: ${STAGING_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      NFM_LIGHTRAG_HOST: nucpot-staging-lightrag
      NFM_LIGHTRAG_PORT: "9621"
    depends_on:
      db: { condition: service_healthy }
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=4).status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks: [staging]

  # ---- NFM-DB Next.js web (staging front-end) --------------------------------
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: nucpot-staging-web:${STAGING_IMAGE_TAG:-latest}
    container_name: nucpot-staging-web
    restart: unless-stopped
    ports:
      - "${STAGING_WEB_HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [staging]

  # ---- LightRAG sidecar (knowledge-graph RAG, NFM-1221) -----------------------
  lightrag:
    build:
      context: .
      dockerfile: docker/lightrag.Dockerfile
    image: nucpot-staging-lightrag:${STAGING_IMAGE_TAG:-latest}
    container_name: nucpot-staging-lightrag
    restart: unless-stopped
    ports:
      - "${STAGING_LIGHTRAG_HOST_PORT:-9621}:9621"
    volumes:
      - staging-lightrag-data:/app/data
    environment:
      LLM_BINDING: ${STAGING_LIGHTRAG_LLM_BINDING:-openai}
      LLM_MODEL: ${STAGING_LIGHTRAG_LLM_MODEL:-gpt-4o-mini}
      LLM_BINDING_HOST: ${STAGING_LIGHTRAG_LLM_HOST:-https://api.openai.com/v1}
      LLM_BINDING_API_KEY: ${STAGING_LIGHTRAG_LLM_API_KEY:?Set STAGING_LIGHTRAG_LLM_API_KEY}
      EMBEDDING_BINDING: ${STAGING_LIGHTRAG_EMBEDDING_BINDING:-openai}
      EMBEDDING_MODEL: ${STAGING_LIGHTRAG_EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_BINDING_HOST: ${STAGING_LIGHTRAG_EMBEDDING_HOST:-https://api.openai.com/v1}
      EMBEDDING_BINDING_API_KEY: ${STAGING_LIGHTRAG_EMBEDDING_API_KEY:-${STAGING_LIGHTRAG_LLM_API_KEY}}
      WORKSPACE: /app/data
    depends_on:
      db: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9621/health', timeout=4).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks: [staging]

  # ---- Cloudflare Tunnel connector (public ingress) --------------------------
  # Runs the remotely-managed staging tunnel so the whole stack — including
  # public ingress — is reproducible from the repo (NFM-120, gap 1, option a).
  # The tunnel's Cloudflare dashboard ingress routes:
  #   staging.nucpot.dpdns.org     -> http://web:3000
  #   staging-api.nucpot.dpdns.org -> http://api:8000
  # Both hostnames resolve because this container shares nucpot-staging-net
  # with the `web` and `api` services. The token drives a remotely-managed
  # tunnel, so NO local config file is needed.
  #
  # NOTE on healthchecks: cloudflare/cloudflared is a distroless image (only the
  # `cloudflared` binary — no shell, curl, or wget), so an in-container
  # HEALTHCHECK is not viable. Tunnel readiness is observed from the host via
  # the localhost-only metrics port: `curl -fsS http://127.0.0.1:36500/ready`
  # returns 200 once an edge connection is established. `restart: unless-stopped`
  # handles process restarts.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: nucpot-staging-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --metrics 0.0.0.0:36500 run
    environment:
      TUNNEL_TOKEN: ${STAGING_CLOUDFLARE_TUNNEL_TOKEN:?Set STAGING_CLOUDFLARE_TUNNEL_TOKEN in docker/.env.staging}
    ports:
      # Localhost-only metrics for host-side readiness monitoring (see NOTE).
      - "127.0.0.1:${STAGING_CLOUDFLARED_METRICS_HOST_PORT:-36500}:36500"
    depends_on: [api, web]
    networks: [staging]

networks:
  staging:
    name: nucpot-staging-net
    driver: bridge

volumes:
  staging-db-data:
    name: nucpot-staging-db-data
  staging-lightrag-data:
    name: nucpot-staging-lightrag-data
