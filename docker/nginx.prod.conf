# =============================================================================
# NFM-DB — Production nginx reverse proxy REFERENCE config
# =============================================================================
# This is a version-controlled reference for the production nginx setup.
# Actual nginx runs on the host separately from this Docker Compose stack.
#
# Install on the host:
#   sudo cp docker/nginx.prod.conf /etc/nginx/sites-available/nucpot
#   sudo ln -sf /etc/nginx/sites-available/nucpot /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL certificates managed by certbot / Let's Encrypt:
#   sudo certbot --nginx -d nucpot.dpdns.org
# =============================================================================

upstream nucpot_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream nucpot_api {
    server 127.0.0.1:8001;
    keepalive 32;
}

# ---- HTTP -> HTTPS redirect ---------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name nucpot.dpdns.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS server ------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nucpot.dpdns.org;

    # SSL — Let's Encrypt (certbot manages renewal)
    ssl_certificate     /etc/letsencrypt/live/nucpot.dpdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nucpot.dpdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ---- API proxy ------------------------------------------------------------
    location /api/ {
        proxy_pass http://nucpot_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # WebSocket support (for future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---- Next.js web proxy ---------------------------------------------------
    location / {
        proxy_pass http://nucpot_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}
