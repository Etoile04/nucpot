services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: nfm
      POSTGRES_PASSWORD: nfm
      POSTGRES_DB: nfm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nfm -d nfm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
