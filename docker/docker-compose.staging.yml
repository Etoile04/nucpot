# =============================================================================
# NFM / NucPot — Staging stack
# =============================================================================
# Mirrors the production topology but is isolated under the "nfm-staging"
# project name, its own network, and a dedicated postgres volume.
#
# Usage (from repo root):
#   docker compose --env-file docker/.env.staging \
#     -f docker/docker-compose.staging.yml up -d
#
# Prefer the wrapper script, which also runs migrations + the health gate:
#   ./scripts/staging_deploy.sh deploy
#
# See docs/deployment/staging-pipeline.md.
# =============================================================================
name: nfm-staging

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nfm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in docker/.env.staging}
      POSTGRES_DB: ${POSTGRES_DB:-nfm_db}
    volumes:
      - staging-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nfm} -d ${POSTGRES_DB:-nfm_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [staging-net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [staging-net]

  # One-shot Alembic upgrade. Excluded from `up` via the "migrate" profile;
  # staging_deploy.sh runs it explicitly before bringing up the app services.
  migrator:
    profiles: ["migrate"]
    build:
      context: ../apps/api
      dockerfile: ../docker/api.Dockerfile
    image: ${NFM_API_IMAGE:-nfm-staging-api}
    env_file: .env.staging
    environment:
      APP_ENV: staging
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres: { condition: service_healthy }
    networks: [staging-net]

  api:
    build:
      context: ../apps/api
      dockerfile: ../docker/api.Dockerfile
    image: ${NFM_API_IMAGE:-nfm-staging-api}
    restart: unless-stopped
    env_file: .env.staging
    environment:
      APP_ENV: staging
      NFM_DATABASE_URL: ${NFM_DATABASE_URL:?NFM_DATABASE_URL is required in docker/.env.staging}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [staging-net]

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    image: ${NFM_WEB_IMAGE:-nfm-staging-web}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_BASE_URL: ${STAGING_API_URL:?STAGING_API_URL is required in docker/.env.staging}
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [staging-net]

volumes:
  staging-postgres-data:

networks:
  staging-net:
    driver: bridge
