version: '3.8'

services:
  verify-service:
    build:
      context: ./verify-service
    ports:
      - "8000:8000"
    env_file:
      - verify-service/.env
    depends_on:
      - redis
    networks:
      - nucpot-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - nucpot-net
    restart: unless-stopped

networks:
  nucpot-net:
    driver: bridge
