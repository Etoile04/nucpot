name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — Lint, Type-check, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

  e2e:
    name: E2E Tests (Live)
    runs-on: ubuntu-latest
    needs: frontend
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests against live site
        run: pnpm exec playwright test --project=chromium
        env:
          E2E_TARGET: live
          BASE_URL: https://nucpot.dpdns.org
          API_BASE_URL: https://verify.nucpot.dpdns.org
          CI: true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

  backend:
    name: Backend — Lint, Type-check, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Tests (pytest) with coverage (≥80%)
        run: uv run pytest

      - name: File size guard (≤1500 lines)
        run: |
          echo "Checking file sizes..."
          oversized=$(find src -name '*.py' -exec wc -l {} + | awk '$1 > 1500 && $2 != "total" {print $1, $2}')
          if [ -n "$oversized" ]; then
            echo "::error::Files exceeding 1500-line limit detected:"
            echo "$oversized"
            exit 1
          fi
          echo "OK: all Python files under 1500 lines"

  # ===========================================================================
  # Docker Build Verification — catches missing deps before production deploy
  # ===========================================================================
  # This job rebuilds both production Dockerfiles (API + Web) to catch:
  # - pyproject.toml changes that add new Python deps not in Docker image
  # - Dockerfile syntax errors
  # - pnpm-lock.json vs Docker build mismatch
  # - pip install failures from missing system libraries
  # ===========================================================================
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -f docker/prod-api.Dockerfile -t nucpot-ci-api:verify .

      - name: Verify API image can start
        run: |
          # Quick smoke: import the app module inside the container
          docker run --rm nucpot-ci-api:verify \
            python -c "from nfm_db.main import app; print('✅ API app imports successfully')"

      - name: Build Web image
        run: docker build -f docker/web.Dockerfile -t nucpot-ci-web:verify .

      - name: Verify Web image can start
        run: |
          docker run --rm -e NODE_ENV=production nucpot-ci-web:verify \
            node -e "require('./apps/web/server.js')" &
          WEB_PID=$!
          sleep 5
          # Kill if still running (we just need to verify no startup crash)
          kill $WEB_PID 2>/dev/null || true
          echo "✅ Web image starts without error"

  # ===========================================================================
  # S1: CI Failure Triage — dedup, create issue, Feishu alert, auto-close
  # ===========================================================================
  ci-failure-triage:
    name: CI Failure Triage
    runs-on: ubuntu-latest
    needs: [frontend, backend, docker-build, e2e]
    if: failure() && github.event_name == 'push'
    permissions:
      issues: write
      actions: read
    steps:
      - name: Collect failure info & create/update issue
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const sha = context.sha.slice(0, 7);
            const now = new Date().toISOString().slice(0, 19).replace('T', ' ');

            // Determine which jobs failed
            const frontendResult = '${{ needs.frontend.result }}';
            const backendResult = '${{ needs.backend.result }}';
            const dockerBuildResult = '${{ needs.docker-build.result }}';
            const e2eResult = '${{ needs.e2e.result }}';

            const failed = [];
            if (frontendResult === 'failure') failed.push('Frontend');
            if (backendResult === 'failure') failed.push('Backend');
            if (dockerBuildResult === 'failure') failed.push('Docker-Build');
            if (e2eResult === 'failure') failed.push('E2E');

            if (failed.length === 0) {
              core.info('No jobs actually failed, skipping triage.');
              return;
            }

            const failedJobs = failed.join(', ');
            const title = `[CI-AUTO] ${failedJobs} failed (${sha})`;

            // Dedup: search for open issue with same title prefix + same SHA
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['ci-failure'],
              state: 'open',
            });

            const match = existing.data.find(i => i.title.includes(sha));

            if (match) {
              // Append comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `⚠️ **Still failing** at ${now}\n\nFailed: ${failedJobs}\n[View Run](${runUrl})`
              });
              core.info(`Updated existing issue #${match.number}`);
            } else {
              // Close stale ci-failure issues from previous commits
              for (const old of existing.data) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: old.number,
                  state: 'closed',
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: old.number,
                  body: `✅ Auto-closed: superseded by newer CI failure [#${0}](${runUrl}) on ${sha}.`
                });
                core.info(`Closed stale issue #${old.number}`);
              }

              // Create new issue
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: `## CI Failure — ${now}\n\n` +
                  `**Commit**: \`${sha}\`\n` +
                  `**Failed jobs**: ${failedJobs}\n` +
                  `**Branch**: \`${{ github.ref_name }}\`\n\n` +
                  `### Failed Jobs\n` +
                  `- Frontend: ${frontendResult}\n` +
                  `- Backend: ${backendResult}\n` +
                  `- Docker-Build: ${dockerBuildResult}\n` +
                  `- E2E: ${e2eResult}\n\n` +
                  `### Actions\n` +
                  `1. [View failed run](${runUrl})\n` +
                  `2. Download artifacts for detailed logs\n` +
                  `3. Fix or quarantine flaky tests\n` +
                  `4. This issue will auto-close when CI passes`,
                labels: ['ci-failure'],
              });
              core.info(`Created new issue #${newIssue.data.number}`);
            }

      - name: Send Feishu alert
        if: always() && failure()
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            SHA="${{ github.sha }}"
            FAILED_JOBS="${{ needs.frontend.result }},${{ needs.backend.result }},${{ needs.e2e.result }}"

            curl -sf -X POST "$WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d '{
                "msg_type": "interactive",
                "card": {
                  "header": {
                    "title": {"tag": "plain_text", "content": "CI Failed"},
                    "template": "red"
                  },
                  "elements": [{
                    "tag": "markdown",
                    "content": "**NucPot CI failed**\nTime: '"$TIMESTAMP"'\nSHA: `'"$SHA"'`\n[View Run]('"$RUN_URL"')\nJobs: Frontend='"${{ needs.frontend.result }}"', Backend='"${{ needs.backend.result }}"', E2E='"${{ needs.e2e.result }}"'"
                  }]
                }
              }' || true
          fi
        env:
          WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK }}

  # ===========================================================================
  # S1b: Auto-close ci-failure issues when CI passes on new commit
  # ===========================================================================
  ci-recovery:
    name: CI Recovery — close stale issues
    runs-on: ubuntu-latest
    needs: [frontend, backend, docker-build, e2e]
    if: success() && github.event_name == 'push'
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            // Close all open ci-failure issues — CI is green now
            const sha = context.sha.slice(0, 7);
            const now = new Date().toISOString().slice(0, 19).replace('T', ' ');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['ci-failure'],
              state: 'open',
            });

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **CI recovered** at ${now}\n\nGreen commit: \`${sha}\`\nClosing this issue.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              core.info(`Closed recovered issue #${issue.number}`);
            }

            if (issues.data.length === 0) {
              core.info('No open ci-failure issues to close.');
            }
