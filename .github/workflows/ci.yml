name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — Lint, Type-check, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

  e2e:
    name: E2E Tests (Live)
    runs-on: ubuntu-latest
    needs: frontend
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests against live site
        run: pnpm exec playwright test --project=chromium
        env:
          E2E_TARGET: live
          BASE_URL: https://nucpot.dpdns.org
          API_BASE_URL: https://verify.nucpot.dpdns.org
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

  backend:
    name: Backend — Lint, Type-check, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Tests (pytest) with coverage (≥80%)
        run: uv run pytest

      - name: File size guard (≤1500 lines)
        run: |
          echo "Checking file sizes..."
          oversized=$(find src tests -name '*.py' -exec wc -l {} + | awk '$1 > 1500 && $2 != "total" {print $1, $2}')
          if [ -n "$oversized" ]; then
            echo "::error::Files exceeding 1500-line limit detected:"
            echo "$oversized"
            exit 1
          fi
          echo "OK: all Python files under 1500 lines"
