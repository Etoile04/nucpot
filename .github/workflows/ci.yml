name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — Lint, Type-check, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

  e2e:
    name: E2E Tests (Live)
    runs-on: ubuntu-latest
    needs: frontend
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests against live site
        run: pnpm exec playwright test --project=chromium
        env:
          E2E_TARGET: live
          BASE_URL: https://nucpot.dpdns.org
          API_BASE_URL: https://verify.nucpot.dpdns.org
          CI: true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

  e2e-mocked:
    # Mirrors the live e2e job but runs against the locally-spun dev server
    # so mocked flows (such as the RAG chat spec, NFM-1399) actually
    # exercise in CI. The live job sets `E2E_TARGET=live`, which causes
    # the spec's `test.skip(isLive, ...)` guard to skip every test —
    # without this job the mocked flow would never run on PRs or pushes.
    # E2E_TARGET is intentionally NOT set here so playwright.config.ts
    # keeps its webServer block enabled (`pnpm dev` on :3000).
    name: E2E Tests (Mocked Flows)
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run RAG chat mocked flow
        # Default baseURL = http://localhost:3000 from playwright.config.ts.
        # webServer auto-spawns `pnpm dev` because E2E_TARGET is unset.
        run: pnpm exec playwright test e2e/rag-chat.spec.ts --project=chromium
        env:
          CI: true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-mocked
          path: apps/web/playwright-report/
          retention-days: 30

  backend:
    name: Backend — Lint, Type-check, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Tests (pytest) with coverage (≥80%)
        run: uv run pytest

      - name: File size guard (≤1500 lines)
        run: |
          echo "Checking file sizes..."
          oversized=$(find src tests -name '*.py' -exec wc -l {} + | awk '$1 > 1500 && $2 != "total" {print $1, $2}')
          if [ -n "$oversized" ]; then
            echo "::error::Files exceeding 1500-line limit detected:"
            echo "$oversized"
            exit 1
          fi
          echo "OK: all Python files under 1500 lines"
