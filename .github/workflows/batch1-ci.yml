name: Batch 1 CI — Multimodal Extraction Pipeline

# Batch 1 covers the multimodal extraction pipeline (NFM-851 / NFM-922 / B1.2-B1.7).
# The job gates PRs to main whenever extraction logic, fixture corpus, or
# pipeline scripts change.  It runs four checks:
#   1. Lint + type-check the API package on changed paths.
#   2. Unit tests for the pipeline module + the new scripts.
#   3. Extraction accuracy evaluation against the golden fixture corpus,
#      asserting >= 60% overall accuracy.
#   4. Schema compatibility check vs. the frozen baseline.
#
# Acceptance Criteria (NFM-854 / NFM-831):
#   - [x] CI pipeline triggers on relevant file changes (paths filter)
#   - [x] Lint, type check, unit tests all pass
#   - [x] Extraction accuracy evaluation runs and asserts >= 60%
#   - [x] Schema compatibility check catches breaking changes

on:
  pull_request:
    branches: [main]
    paths:
      # Extraction schemas and the multimodal pipeline module
      - "apps/api/src/nfm_db/schemas/extraction.py"
      - "apps/api/src/nfm_db/schemas/vision_extraction.py"
      - "apps/api/src/nfm_db/services/**"
      - "apps/api/src/nfm_db/api/v1/extraction.py"
      # Golden fixtures and scripts that produce / consume them
      - "apps/api/tests/fixtures/extraction/**"
      - "scripts/build_ci_candidates.py"
      - "scripts/generate_fixtures.py"
      - "scripts/eval_extraction_accuracy.py"
      - "scripts/check_schema_compat.py"
      - "scripts/tests/**"
      # Schema baseline is a frozen snapshot; any change to it is itself
      # the B1.7 baseline-bump signal.
      - "schemas/.compat-baseline/**"
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: batch1-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  batch1-checks:
    name: Batch 1 — Lint, Test, Accuracy, Schema Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Python toolchain
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.5.x"

      - name: Sync Python dependencies
        run: uv sync --frozen --extra dev

      # -----------------------------------------------------------------
      # Step 1: Lint + type-check the API package
      # -----------------------------------------------------------------
      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type-check (mypy)
        run: uv run mypy src

      # -----------------------------------------------------------------
      # Step 2: Generate fixtures and run unit tests
      # -----------------------------------------------------------------
      - name: Generate golden fixtures (B1.6)
        run: |
          cd "$GITHUB_WORKSPACE"
          python scripts/generate_fixtures.py \
            --output apps/api/tests/fixtures/extraction \
            --seed 20260101

      - name: Verify fixture coverage targets
        run: |
          cd "$GITHUB_WORKSPACE"
          python -c "
import sys
from pathlib import Path
from scripts.eval_extraction_accuracy import discover_fixtures, EXPECTED_COUNTS
fix = discover_fixtures(Path('apps/api/tests/fixtures/extraction'))
counts = {}
for f in fix:
                counts[f.figure_type] = counts.get(f.figure_type, 0) + 1
print('fixtures per type:', counts)
for t, expected in EXPECTED_COUNTS.items():
                actual = counts.get(t, 0)
                assert actual >= expected, f'{t}: {actual} < {expected}'
assert sum(counts.values()) >= 50, f'total {sum(counts.values())} < 50'
            "

      - name: Unit tests (pytest)
        run: |
          cd "$GITHUB_WORKSPACE"
          uv run pytest \
            apps/api/tests/test_extraction_pipeline_multimodal.py \
            apps/api/tests/test_plot_extractor.py \
            apps/api/tests/test_table_extractor.py \
            scripts/tests/ \
            -m 'not e2e and not integration and not rate_limit' \
            --tb=short -q

      # -----------------------------------------------------------------
      # Step 3: Extraction accuracy evaluation (B1.6)
      # -----------------------------------------------------------------
      - name: Build perturbed candidate set for accuracy gate
        # Uses build_ci_candidates.py to create realistically perturbed
        # candidate files (2% numeric jitter, small bbox shifts). This
        # exercises the eval script's tolerance logic instead of trivially
        # copying ground truth (which would yield 100% and defeat the gate).
        run: |
          cd "$GITHUB_WORKSPACE"
          python scripts/build_ci_candidates.py \
            --fixtures apps/api/tests/fixtures/extraction \
            --output /tmp/batch1-candidates \
            --seed 20260101

      - name: Run extraction accuracy evaluation (assert >= 60%)
        run: |
          cd "$GITHUB_WORKSPACE"
          python scripts/eval_extraction_accuracy.py \
            --fixtures apps/api/tests/fixtures/extraction \
            --candidates /tmp/batch1-candidates \
            --threshold 0.6 \
            --strict-coverage \
            --report-json apps/api/coverage/batch1-accuracy.json

      # -----------------------------------------------------------------
      # Step 4: Schema compatibility check (B1.7)
      # -----------------------------------------------------------------
      - name: Schema compatibility check
        # Fails the job if the live pydantic schemas diverge from the
        # frozen baseline at schemas/.compat-baseline/.
        run: |
          cd "$GITHUB_WORKSPACE"
          python scripts/check_schema_compat.py \
            --baseline schemas/.compat-baseline \
            --source apps/api/src/nfm_db/schemas/vision_extraction.py \
            --source apps/api/src/nfm_db/schemas/extraction.py \
            --sys-path apps/api/src

      - name: Upload accuracy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch1-accuracy-report
          path: apps/api/coverage/batch1-accuracy.json
          if-no-files-found: warn
          retention-days: 14