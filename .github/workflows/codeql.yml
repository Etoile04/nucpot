name: CodeQL Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"

jobs:
  analyze-typescript:
    name: CodeQL (TypeScript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none
          config: |
            paths:
              - apps/web/src
              - apps/web/e2e
            paths-ignore:
              - "**/*.test.ts"
              - "**/*.spec.ts"
              - "node_modules"

      - uses: github/codeql-action/analyze@v4
        with:
          category: "language:typescript"

  analyze-python:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    if: false  # No Python source on this branch; enable when apps/api is merged
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none

      - uses: github/codeql-action/analyze@v4
        with:
          category: "language:python"
