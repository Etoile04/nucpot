name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: API Tests with Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Enforce single alembic head (no forked migration graph)
        # Prevents a forked migration graph from merging again. `alembic heads`
        # is a pure graph operation (no DB/app import), so it runs fast and
        # catches "Multiple head revisions are present" before it can break
        # `alembic upgrade head` in the deployed container. See NFM-167.
        run: |
          set -euo pipefail
          heads=$(uv run alembic heads | grep -c '(head)' || true)
          echo "Alembic head count: ${heads}"
          if [ "${heads}" -ne 1 ]; then
            echo "::error::Forked alembic migration graph detected (${heads} heads). Unite the branches with 'alembic merge <head_a> <head_b>' before merging this PR (NFM-167)."
            uv run alembic heads
            exit 1
          fi
          echo "OK: exactly one alembic head"

      - name: Check schema backward compatibility (NFM-869)
        run: uv run python ../../scripts/check_schema_compat.py --schema src/nfm_db/schemas/ontology.py --baseline ../../.schema-baseline.json

      - name: Run tests with coverage
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        if: always()
        with:
          file: apps/api/coverage.xml
          flags: api
          name: api-coverage
          fail_ci_if_error: false
