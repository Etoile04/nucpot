# Production Deployment Workflow
#
# This workflow handles the production deployment of the NFMD system.
# It includes testing, building, security scanning, and deployment with rollback capability.

name: Production Deployment

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # =============================================================================
  # Pre-deployment Checks
  # =============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run security scan
        run: |
          chmod +x apps/api/scripts/security-scan.sh
          ./apps/api/scripts/security-scan.sh

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            security-scan-results.*

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run linting
        run: uv run ruff check src tests

  # =============================================================================
  # Testing
  # =============================================================================
  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: [type-check]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-results
          path: |
            apps/web/playwright-report/
            apps/web/coverage/

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [python-lint]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run unit tests
        run: uv run pytest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            apps/api/coverage.xml
            apps/api/htmlcov/

  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [test-web, test-api]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Start API server
        run: |
          uv run uvicorn src.main:app &
          echo $! > api.pid
          echo "Waiting for API to start..."
          sleep 15

      - name: Run performance tests
        run: |
          uv run --with locust locust -f tests/performance/locustfile.py \
            --headless --users 20 --spawn-rate 2 --run-time 3m \
            --host http://localhost:8000 \
            --csv perf_results --html perf_report.html

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: |
            apps/api/perf_results_*
            apps/api/perf_report.html

      - name: Cleanup API server
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill $(cat api.pid) || true
            rm api.pid
          fi

  # =============================================================================
  # Build
  # =============================================================================
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: [test-web]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next

  # =============================================================================
  # Deployment
  # =============================================================================
  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    needs: [build-web, security-scan]
    environment:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: apps/web

      - name: Run smoke tests
        run: |
          curl -f https://nucpot.dpdns.org/health || exit 1
          curl -f https://nucpot.dpdns.org/ | grep "NFMD" || exit 1

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [test-api, performance-test]
    environment:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production server
        run: |
          echo "Deploying API to production server..."
          # SSH deployment
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            cd /var/www/nucpot/api
            git pull origin main
            cd ../worker
            git pull origin main

            # Restart services
            sudo systemctl restart nucpot-api
            sudo systemctl restart nucpot-worker

            # Wait for services to start
            sleep 10

            # Health check
            curl -f http://localhost:8000/api/health || exit 1
          ENDSSH

      - name: Run smoke tests
        run: |
          curl -f https://nucpot.dpdns.org/api/health || exit 1

      - name: Verify Celery workers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "celery -A nucpot inspect active"

  # =============================================================================
  # Post-deployment
  # =============================================================================
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-api]
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          # Test API health
          curl -f https://nucpot.dpdns.org/api/health | jq .

          # Test web app
          curl -f https://nucpot.dpdns.org/ | grep "NFMD"

          # Test MD verification endpoint
          curl -f https://nucpot.dpdns.org/api/md-verification/jobs | jq .

      - name: Run regression tests
        run: |
          cd apps/web
          pnpm run test:e2e --grep "regression"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "Deployment status: ${{ job.status }}"
          # Add Slack/Email notification here