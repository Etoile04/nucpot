# Production Deployment Workflow
#
# This workflow handles the production deployment of the NFMD system.
# It includes testing, building, security scanning, and deployment with rollback capability.

name: Production Deployment

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # =============================================================================
  # Pre-deployment Checks
  # =============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Run security scan
        run: |
          chmod +x apps/api/scripts/security-scan.sh
          ./apps/api/scripts/security-scan.sh

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-scan-results
          path: |
            security-scan-results.*

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run linting
        run: uv run ruff check src tests

  # =============================================================================
  # Testing
  # =============================================================================
  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: [type-check]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-test-results
          path: |
            apps/web/playwright-report/
            apps/web/coverage/

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [python-lint]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run unit tests
        run: uv run pytest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-results
          path: |
            apps/api/coverage.xml
            apps/api/htmlcov/

  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [test-web, test-api]
    if: always()
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Start API server
        env:
          PYTHONPATH: src:.
        run: |
          uv run uvicorn nfm_db.main:app &
          echo $! > api.pid
          echo "Waiting for API to start..."
          sleep 15

      - name: Run performance tests
        run: |
          uv run --with locust locust -f tests/performance/locustfile.py \
            --headless --users 20 --spawn-rate 2 --run-time 3m \
            --host http://localhost:8000 \
            --csv perf_results --html perf_report.html \
            --only-summary || true
          echo "Performance tests completed (failures may be expected without a database)"

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-results
          path: |
            apps/api/perf_results_*
            apps/api/perf_report.html

      - name: Cleanup API server
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill $(cat api.pid) || true
            rm api.pid
          fi

  # =============================================================================
  # Build
  # =============================================================================
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: [test-web]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: apps/web/.next

  # =============================================================================
  # Deployment
  # =============================================================================
  # NFM-586 / NFM-593: Self-hosted runner on Mac Studio (same machine as
  # production Docker stack). Deploy uses loopback SSH (127.0.0.1) over the
  # host's OpenSSH sshd — same pattern as staging (NFM-150 rev 2).
  # No external SSH needed. DEPLOY_HOST/DEPLOY_KEY/DEPLOY_USER secrets are
  # no longer consumed by this workflow and can be deleted.
  # =============================================================================
  deploy-prod:
    name: Deploy Production (Docker Compose)
    runs-on: [self-hosted, production]
    needs: [build-web, test-api]
    if: always() && needs.build-web.result == 'success'
    env:
      HTTP_PROXY: http://127.0.0.1:7892
      HTTPS_PROXY: http://127.0.0.1:7892
      NO_PROXY: localhost,127.0.0.1,10.0.0.0/8,172.17.0.0/16,192.168.0.0/16
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Docker Compose (loopback SSH)
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key lwj04@127.0.0.1 << 'ENDSSH'
            cd ~/Projects/nucpot
            export HTTP_PROXY=http://127.0.0.1:7892 HTTPS_PROXY=http://127.0.0.1:7892
            git pull origin main

            # Rebuild and restart ALL containers (including web)
            docker compose -f docker-compose.prod.yml --env-file docker/.env.prod up -d --build

            # Wait for services to start
            sleep 20

            # Ensure migration files match HEAD (prevent stale local edits)
            git checkout HEAD -- apps/api/scripts/migrations/

            # Run database migrations (idempotent, both files)
            for SQL_FILE in apps/api/scripts/migrations/001_add_dedup_hash.sql \
                             apps/api/scripts/migrations/002_fix_dedup_hash_simple.sql; do
              if [ -f "$SQL_FILE" ]; then
                echo "Applying migration: $SQL_FILE"
                docker exec -i nucpot-prod-db psql -U "${PROD_POSTGRES_USER:-nfm}" -d "${PROD_POSTGRES_DB:-nfm_db}" < "$SQL_FILE" || echo "Migration $SQL_FILE skipped (may already be applied)"
              fi
            done

            # Internal health checks
            echo "Checking API health..."
            curl -f http://localhost:8001/api/v1/health || exit 1

            echo "Checking Web health..."
            curl -f http://localhost:3000/ || exit 1
          ENDSSH

      - name: External smoke tests
        run: |
          curl -f https://nucpot.dpdns.org/ | grep -q "NFMD" || exit 1
          curl -f https://nucpot.dpdns.org/api/v1/health || exit 1

      - name: Verify Celery workers
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key lwj04@127.0.0.1 \
            "docker exec nucpot-prod-worker celery -A nfm_db.services.celery_app:celery_app inspect active"

  # =============================================================================
  # Post-deployment
  # =============================================================================
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          # Test API health
          curl -f https://nucpot.dpdns.org/api/v1/health | jq .

          # Test web app
          curl -f https://nucpot.dpdns.org/ | grep "NFMD"

          # Test MD verification endpoint
          curl -f https://nucpot.dpdns.org/api/md-verification/jobs | jq .

      - name: Run regression tests
        run: |
          cd apps/web
          pnpm run test:e2e --grep "regression"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "Deployment status: ${{ job.status }}"
          # Add Slack/Email notification here