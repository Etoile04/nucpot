# Production Deployment Workflow
#
# This workflow handles the production deployment of the NFMD system.
# It includes testing, building, security scanning, and deployment with rollback capability.

name: Production Deployment

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # =============================================================================
  # Pre-deployment Checks
  # =============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run security scan
        run: |
          chmod +x apps/api/scripts/security-scan.sh
          ./apps/api/scripts/security-scan.sh

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-scan-results
          path: |
            security-scan-results.*

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run linting
        run: uv run ruff check src tests

  # =============================================================================
  # Testing
  # =============================================================================
  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: [type-check]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-test-results
          path: |
            apps/web/playwright-report/
            apps/web/coverage/

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [python-lint]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run unit tests
        run: uv run pytest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-results
          path: |
            apps/api/coverage.xml
            apps/api/htmlcov/

  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [test-web, test-api]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Start API server
        run: |
          uv run uvicorn src.main:app &
          echo $! > api.pid
          echo "Waiting for API to start..."
          sleep 15

      - name: Run performance tests
        run: |
          uv run --with locust locust -f tests/performance/locustfile.py \
            --headless --users 20 --spawn-rate 2 --run-time 3m \
            --host http://localhost:8000 \
            --csv perf_results --html perf_report.html

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-results
          path: |
            apps/api/perf_results_*
            apps/api/perf_report.html

      - name: Cleanup API server
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill $(cat api.pid) || true
            rm api.pid
          fi

  # =============================================================================
  # Build
  # =============================================================================
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: [test-web]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: apps/web/.next

  # =============================================================================
  # Deployment
  # =============================================================================
  verify-web:
    name: Verify Web App (Vercel Auto-Deploy)
    runs-on: ubuntu-latest
    needs: [build-web, security-scan]
    steps:
      - name: Wait for Vercel auto-deploy
        run: |
          echo "Vercel auto-deploys on push to main via GitHub integration."
          echo "Waiting 60s for Vercel deployment to settle..."
          sleep 60

      - name: Verify web app is live
        run: |
          curl -f https://nucpot.dpdns.org/ | grep "NFMD" || exit 1
          curl -f https://nucpot.dpdns.org/browse || exit 1

  deploy-api:
    name: Deploy API (Docker Compose)
    runs-on: ubuntu-latest
    needs: [test-api, performance-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via Docker Compose
        env:
          SSH_HOST: ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SSH_HOST << 'ENDSSH'
            cd ~/nucpot
            git pull origin main

            # Rebuild and restart API + Worker + Redis containers
            docker compose -f docker-compose.prod.yml --env-file docker/.env.prod up -d --build

            # Wait for services to start
            sleep 20

            # Health check (internal)
            curl -f http://localhost:8001/api/v1/health || exit 1
          ENDSSH

      - name: Run external smoke tests
        run: |
          curl -f https://nucpot.dpdns.org/api/health || curl -f https://nucpot.dpdns.org/api/v1/health || exit 1

      - name: Verify Celery workers
        env:
          SSH_HOST: ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SSH_HOST \
            "docker exec nucpot-prod-worker celery -A nfm_db.services.celery_app:celery_app inspect active"

  # =============================================================================
  # Post-deployment
  # =============================================================================
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [verify-web, deploy-api]
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          # Test API health
          curl -f https://nucpot.dpdns.org/api/health | jq .

          # Test web app
          curl -f https://nucpot.dpdns.org/ | grep "NFMD"

          # Test MD verification endpoint
          curl -f https://nucpot.dpdns.org/api/md-verification/jobs | jq .

      - name: Run regression tests
        run: |
          cd apps/web
          pnpm run test:e2e --grep "regression"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "Deployment status: ${{ job.status }}"
          # Add Slack/Email notification here