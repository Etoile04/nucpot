---
# This workflow handles the production deployment of the NFMD system.
# It includes testing, building, security scanning, and deployment with rollback capability.

name: Production Deployment

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # =============================================================================
  # Pre-deployment Checks
  # =============================================================================
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: yamllint .github/ --format colored

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v7

      - name: Run security scan
        run: |
          chmod +x apps/api/scripts/security-scan.sh
          ./apps/api/scripts/security-scan.sh

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-scan-results
          path: |
            security-scan-results.*

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run linting
        run: uv run ruff check src tests

  # =============================================================================
  # Testing
  # =============================================================================
  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: [type-check]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-test-results
          path: |
            apps/web/playwright-report/
            apps/web/coverage/

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [python-lint]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run unit tests
        run: uv run pytest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-results
          path: |
            apps/api/coverage.xml
            apps/api/htmlcov/

  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [test-web, test-api]
    if: always()
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Start API server
        env:
          PYTHONPATH: src:.
        run: |
          uv run uvicorn nfm_db.main:app &
          echo $! > api.pid
          echo "Waiting for API to start..."
          sleep 15

      - name: Run performance tests
        run: |
          uv run --with locust locust -f tests/performance/locustfile.py \
            --headless --users 20 --spawn-rate 2 --run-time 3m \
            --host http://localhost:8000 \
            --csv perf_results --html perf_report.html \
            --only-summary || true
          echo "Performance tests completed (failures may be expected without a database)"

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-results
          path: |
            apps/api/perf_results_*
            apps/api/perf_report.html

      - name: Cleanup API server
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill $(cat api.pid) || true
            rm api.pid
          fi

  # =============================================================================
  # Build
  # =============================================================================
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: [test-web]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: apps/web/.next

  # =============================================================================
  # Deployment
  # =============================================================================
  # NFM-586 / NFM-593: Self-hosted runner on Mac Studio (same machine as
  # production Docker stack). Deploy uses loopback SSH (127.0.0.1) over the
  # host's OpenSSH sshd — same pattern as staging (NFM-150 rev 2).
  # No external SSH needed. DEPLOY_HOST/DEPLOY_KEY/DEPLOY_USER secrets are
  # no longer consumed by this workflow and can be deleted.
  # =============================================================================
  deploy-prod:
    name: Deploy Production (Docker Compose)
    runs-on: [self-hosted, production]
    needs: [build-web, test-api]
    if: always() && needs.build-web.result == 'success'
    env:
      HTTP_PROXY: http://127.0.0.1:7892
      HTTPS_PROXY: http://127.0.0.1:7892
      NO_PROXY: localhost,127.0.0.1,10.0.0.0/8,172.17.0.0/16,192.168.0.0/16
    steps:
      - uses: actions/checkout@v7

      - name: Deploy via Docker Compose (loopback SSH)
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key lwj04@127.0.0.1 << 'ENDSSH'
            cd ~/Projects/nucpot
            export HTTP_PROXY=http://127.0.0.1:7892 HTTPS_PROXY=http://127.0.0.1:7892
            git pull origin main

            # Rebuild and restart ALL containers (including web)
            docker compose -f docker-compose.prod.yml --env-file docker/.env.prod up -d --build

            # Wait for services to start
            sleep 20

            # Ensure migration files match HEAD (prevent stale local edits)
            git checkout HEAD -- apps/api/scripts/migrations/

            # Run database migrations (idempotent, both files)
            for SQL_FILE in apps/api/scripts/migrations/001_add_dedup_hash.sql \
                             apps/api/scripts/migrations/002_fix_dedup_hash_simple.sql; do
              if [ -f "$SQL_FILE" ]; then
                echo "Applying migration: $SQL_FILE"
                docker exec -i nucpot-prod-db psql -U "${PROD_POSTGRES_USER:-nfm}" -d "${PROD_POSTGRES_DB:-nfm_db}" < "$SQL_FILE" || echo "Migration $SQL_FILE skipped (may already be applied)"
              fi
            done

            # Internal health checks
            echo "Checking API health..."
            curl -f http://localhost:8001/api/v1/health || exit 1

            echo "Checking Web health..."
            curl -f http://localhost:3000/ || exit 1
          ENDSSH

      - name: External smoke tests
        run: |
          # Retry loop: give Cloudflare Tunnel time to stabilize after container restart
          for i in 1 2 3; do
            curl -sf https://nucpot.dpdns.org/ > /dev/null && break
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done

          echo "=== Frontend smoke ==="
          curl -f https://nucpot.dpdns.org/ | grep -q "NFMD" || exit 1

          echo "=== API health endpoint ==="
          curl -f https://verify.nucpot.dpdns.org/api/v1/health || exit 1

          echo "=== API /potentials endpoint (key data route) ==="
          curl -sf https://verify.nucpot.dpdns.org/api/v1/potentials -o /dev/null || exit 1

          echo "=== API /reference-values endpoint ==="
          curl -sf https://verify.nucpot.dpdns.org/api/v1/reference-values -o /dev/null || exit 1

          echo "=== All external smoke tests passed ==="

      - name: Verify Celery workers
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key lwj04@127.0.0.1 \
            "export PATH=\"/usr/local/bin:\$PATH\" && docker exec nucpot-prod-worker celery -A nfm_db.services.celery_app:celery_app inspect active"

  # =============================================================================
  # Post-deployment
  # =============================================================================
  smoke-test:
    name: Smoke Tests (@smoke)
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run @smoke E2E tests
        run: pnpm exec playwright test --project=chromium --grep "@smoke"
        env:
          E2E_TARGET: live
          BASE_URL: https://nucpot.dpdns.org
          API_BASE_URL: https://verify.nucpot.dpdns.org
          CI: true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-test-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ===========================================================================
  # S2: Deploy notification — GitHub issue + Feishu alert + auto-close
  # ===========================================================================
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: always() && github.event_name == 'push'
    permissions:
      issues: write
    steps:
      - name: Deploy result triage
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const sha = context.sha.slice(0, 7);
            const now = new Date().toISOString().slice(0, 19).replace('T', ' ');
            const deployResult = '${{ needs.smoke-test.result }}';

            if (deployResult === 'failure') {
              // Close stale deploy-failure issues
              const stale = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['deploy-failure'],
                state: 'open',
              });
              for (const old of stale.data) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: old.number,
                  state: 'closed',
                });
              }

              // Create new deploy-failure issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[DEPLOY-FAILED] Production deploy failed (${sha})`,
                body: `## Production Deployment Failed\n\n` +
                  `**Time**: ${now}\n` +
                  `**Commit**: \`${sha}\`\n` +
                  `**Deploy job**: failure\n` +
                  `**Smoke test**: ${deployResult}\n\n` +
                  `### Actions\n` +
                  `1. [View failed run](${runUrl})\n` +
                  `2. Check Docker containers: \`ssh lwj04@<host> docker ps\`\n` +
                  `3. Check Cloudflare Tunnel status\n` +
                  `4. Manual rollback: \`ssh lwj04@<host> docker compose -f docker-compose.prod.yml down && git checkout <prev-sha> && docker compose -f docker-compose.prod.yml up -d --build\`\n` +
                  `5. This issue auto-closes on next successful deploy`,
                labels: ['deploy-failure'],
              });
            } else if (deployResult === 'success') {
              // Close open deploy-failure issues
              const stale = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['deploy-failure'],
                state: 'open',
              });
              for (const issue of stale.data) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ **Deploy recovered** at ${now}\n\nGreen commit: \`${sha}\`\nClosing.`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
              }

              // Only create deploy-success issue on version tags
              if (context.ref.startsWith('refs/tags/v')) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[DEPLOY-OK] Production ${context.ref} deployed (${sha})`,
                  body: `## Production Deployment Succeeded\n\n` +
                    `**Time**: ${now}\n` +
                    `**Tag**: ${context.ref}\n` +
                    `**Commit**: \`${sha}\`\n` +
                    `[View Run](${runUrl})`,
                  labels: ['deploy-success'],
                });
              }
            }

      - name: Send Feishu alert
        if: always()
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            SHA="${{ github.sha }}"

            if [ "${{ job.status }}" = "failure" ]; then
              TEMPLATE="red"
              TITLE="Deploy Failed"
            else
              TEMPLATE="green"
              TITLE="Deploy Succeeded"
            fi

            curl -sf -X POST "$WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d '{
                "msg_type": "interactive",
                "card": {
                  "header": {
                    "title": {"tag": "plain_text", "content": "'"$TITLE"'"},
                    "template": "'"$TEMPLATE"'"
                  },
                  "elements": [{
                    "tag": "markdown",
                    "content": "**NucPot '"$TITLE"'**\nTime: '"$TIMESTAMP"'\nSHA: `'"$SHA"'`\n[View Run]('"$RUN_URL"')\nResult: '"${{ needs.smoke-test.result }}"'"
                  }]
                }
              }' || true
          fi
        env:
          WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK }}
