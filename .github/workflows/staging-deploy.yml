# =============================================================================
# NFM / NucPot — Staging Deploy
# =============================================================================
# Builds (optional) and deploys the staging stack, then runs the smoke test,
# and auto-rolls back on failure.
#
# Triggers:
#   - push to the "staging" branch or a "v*-staging" tag
#   - manual workflow_dispatch (with skip-build / image-tag overrides)
#
# Prerequisites (provisioned by NFM-112 / board, tracked on NFM-112):
#   - GitHub "staging" environment with secrets:
#       STAGING_SSH_HOST, STAGING_SSH_PORT, STAGING_SSH_USER, STAGING_SSH_KEY
#       STAGING_WEB_URL, STAGING_API_URL
#       GHCR_TOKEN (PAT with write:packages) — or rely on the default GITHUB_TOKEN
#   - staging host reachable over SSH with docker + compose v2 installed
#
# Until those land this workflow is correct, reviewed code that will run on the
# first real deploy. See docs/deployment/staging-pipeline.md.
# =============================================================================
name: Staging Deploy

on:
  push:
    branches: [staging]
    tags: ["v*-staging"]
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip the image build+push job (host builds from source)"
        type: boolean
        default: false
      image_tag:
        description: "Override image tag (default: staging-<short sha>)"
        type: string
        required: false

concurrency:
  group: staging-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/nucpot-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/nucpot-web

jobs:
  build:
    name: Build & push staging images
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_build }}
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=staging-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - id: auth
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.API_IMAGE }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.WEB_IMAGE }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to staging host
    runs-on: ubuntu-latest
    environment: staging
    needs: build
    if: ${{ !cancelled() && !failure() }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tags
        id: img
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.skip_build }}" = "true" ]; then
            echo "api_image=" >> "$GITHUB_OUTPUT"
            echo "web_image=" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ needs.build.outputs.image_tag }}"
            echo "api_image=${{ env.API_IMAGE }}:${TAG}" >> "$GITHUB_OUTPUT"
            echo "web_image=${{ env.WEB_IMAGE }}:${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          envs: API_IMAGE_TAG,WEB_IMAGE_TAG
          env:
            API_IMAGE_TAG: ${{ steps.img.outputs.api_image }}
            WEB_IMAGE_TAG: ${{ steps.img.outputs.web_image }}
          script: |
            set -euo pipefail
            cd ~/nucpot
            git fetch --prune origin
            git checkout --force "${{ github.sha }}"
            git reset --hard "${{ github.sha }}"
            export NFM_API_IMAGE="$API_IMAGE_TAG"
            export NFM_WEB_IMAGE="$WEB_IMAGE_TAG"
            ./scripts/staging_deploy.sh deploy

  smoke:
    name: Smoke test staging
    runs-on: ubuntu-latest
    needs: deploy
    outputs:
      passed: ${{ steps.smoke.outputs.smoke_passed }}
    steps:
      - uses: actions/checkout@v4

      - id: smoke
        run: python3 scripts/staging_smoke_test.py
        env:
          STAGING_WEB_URL: ${{ secrets.STAGING_WEB_URL }}
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}

  rollback:
    name: Auto-rollback on failure
    runs-on: ubuntu-latest
    environment: staging
    needs: smoke
    if: ${{ failure() }}
    steps:
      - name: Rollback over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/nucpot
            ./scripts/staging_deploy.sh rollback
