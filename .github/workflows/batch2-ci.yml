name: Batch 2 CI — Knowledge Graph Pipeline

# NOTE: services/kg*.py and api/v1/kg*.py paths are intentionally omitted until
# those modules land (NFM-858/NFM-861). Re-add when those files exist on main.

on:
  push:
    branches: [main]
    paths:
      - "apps/api/src/nfm_db/models/kg.py"
      - "apps/api/src/nfm_db/schemas/kg.py"
      - "apps/api/tests/test_kg_models.py"
      - "apps/api/migrations/versions/*kg*"
      - "scripts/eval_entity_linking.py"
      - "scripts/test_query_correctness.py"
      - ".github/workflows/batch2-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/src/nfm_db/models/kg.py"
      - "apps/api/src/nfm_db/schemas/kg.py"
      - "apps/api/tests/test_kg_models.py"
      - "apps/api/migrations/versions/*kg*"
      - "scripts/eval_entity_linking.py"
      - "scripts/test_query_correctness.py"
      - ".github/workflows/batch2-ci.yml"

concurrency:
  group: batch2-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Lint KG paths (ruff)
        run: |
          uv run ruff check \
            src/nfm_db/models/kg.py \
            src/nfm_db/schemas/kg.py \
            tests/test_kg_models.py
          echo "Lint completed"

      - name: Type-check KG paths (mypy)
        run: |
          uv run mypy \
            src/nfm_db/models/kg.py \
            src/nfm_db/schemas/kg.py \
            --ignore-missing-imports
          echo "Type-check completed"

  unit-tests:
    name: KG Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run KG unit tests
        run: uv run pytest tests/test_kg_models.py -v --tb=short

  entity-linking-eval:
    name: Entity Linking Eval (≥90%)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run entity linking evaluation
        run: |
          python ../../scripts/eval_entity_linking.py \
            --fixtures-dir tests/fixtures/entity_linking \
            --min-dedup-rate 90
        env:
          ENTITY_LINKING_EVAL_MODE: fixture_only

  query-correctness:
    name: Query Correctness Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run query correctness tests
        run: |
          python ../../scripts/test_query_correctness.py \
            --fixtures-dir tests/fixtures/query_correctness

  ontology-coverage:
    name: Ontology Coverage Check
    runs-on: ubuntu-latest
    needs: lint-typecheck
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Verify ontology coverage
        run: |
          echo "Checking ontology coverage from KG model frozensets..."
          python -c "
          from nfm_db.models.kg import VALID_NODE_TYPES, VALID_RELATION_TYPES

          # Module-level frozensets are the canonical source — service-layer
          # enforced. Robust to docstring reformat and CheckConstraint edits.
          entity_count = len(VALID_NODE_TYPES)
          relation_count = len(VALID_RELATION_TYPES)
          print(f'Node types ({entity_count}): {sorted(VALID_NODE_TYPES)}')
          print(f'Relation types ({relation_count}): {sorted(VALID_RELATION_TYPES)}')
          assert entity_count >= 5, f'Only {entity_count} node types (need >=5)'
          assert relation_count >= 10, f'Only {relation_count} relation types (need >=10)'

          print('')
          print('PASS: Ontology coverage meets minimum thresholds')
          print(f'  Node types: {entity_count} (>= 5 required)')
          print(f'  Relation types: {relation_count} (>= 10 required)')
          "
