name: Batch 3 CI — E2E Integration + Phase Gate

on:
  push:
    branches: [main]
    paths:
      - "apps/api/tests/test_e2e_integration.py"
      - "apps/api/tests/test_phase_gate.py"
      - "scripts/validate_phase_gate.py"
      - "scripts/eval_extraction_accuracy.py"
      - "apps/api/src/nfm_db/services/conflict_resolution.py"
      - "apps/api/src/nfm_db/models/conflict.py"
      - "apps/api/src/nfm_db/models/conflict_record.py"
      - "apps/api/src/nfm_db/api/v1/conflict.py"
      - "apps/api/src/nfm_db/api/v1/kg.py"
      - ".github/workflows/batch3-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/tests/test_e2e_integration.py"
      - "apps/api/tests/test_phase_gate.py"
      - "scripts/validate_phase_gate.py"
      - "scripts/eval_extraction_accuracy.py"
      - "apps/api/src/nfm_db/services/conflict_resolution.py"
      - "apps/api/src/nfm_db/models/conflict.py"
      - "apps/api/src/nfm_db/models/conflict_record.py"
      - "apps/api/src/nfm_db/api/v1/conflict.py"
      - "apps/api/src/nfm_db/api/v1/kg.py"
      - ".github/workflows/batch3-ci.yml"

concurrency:
  group: batch3-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint + Type Check (E2E + conflict)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Ruff lint (E2E + conflict)
        run: uv run ruff check tests/test_e2e_integration.py tests/test_phase_gate.py src/nfm_db/models/conflict.py src/nfm_db/models/conflict_record.py src/nfm_db/services/conflict_resolution.py src/nfm_db/api/v1/conflict.py

      - name: Ruff format check (E2E + conflict)
        run: uv run ruff format --check tests/test_e2e_integration.py tests/test_phase_gate.py src/nfm_db/models/conflict.py src/nfm_db/models/conflict_record.py src/nfm_db/services/conflict_resolution.py src/nfm_db/api/v1/conflict.py

      - name: Mypy type check (conflict resolution)
        run: uv run mypy src/nfm_db/models/conflict.py src/nfm_db/models/conflict_record.py src/nfm_db/services/conflict_resolution.py src/nfm_db/api/v1/conflict.py --ignore-missing-imports

  e2e-integration-tests:
    name: E2E Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run E2E integration tests
        run: EXTRACTION_STUB_MODE=1 uv run pytest tests/test_e2e_integration.py -v --tb=short -m e2e -o "addopts="

  phase-gate-validation:
    name: Phase Gate Validation
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run phase gate validation tests
        run: uv run pytest tests/test_phase_gate.py -v --tb=short -o "addopts="

      - name: Run phase gate validation script
        run: uv run python ${{ github.workspace }}/scripts/validate_phase_gate.py
