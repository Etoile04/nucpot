name: Batch 3 CI — Extraction Accuracy Eval

on:
  push:
    branches: [main]
    paths:
      - "scripts/eval_extraction_accuracy.py"
      - "apps/api/tests/fixtures/extraction/**"
      - "apps/api/tests/fixtures/golden/**"
      - "apps/api/src/nfm_db/services/figure_detector.py"
      - "apps/api/src/nfm_db/services/plot_extractor.py"
      - "apps/api/src/nfm_db/services/table_extractor.py"
      - "apps/api/src/nfm_db/schemas/figure.py"
      - "apps/api/src/nfm_db/schemas/vision_extraction.py"
      - "tests/eval/**"
      - ".github/workflows/batch3-extraction-eval.yml"
  pull_request:
    branches: [main]
    paths:
      - "scripts/eval_extraction_accuracy.py"
      - "apps/api/tests/fixtures/extraction/**"
      - "apps/api/tests/fixtures/golden/**"
      - "apps/api/src/nfm_db/services/figure_detector.py"
      - "apps/api/src/nfm_db/services/plot_extractor.py"
      - "apps/api/src/nfm_db/services/table_extractor.py"
      - "apps/api/src/nfm_db/schemas/figure.py"
      - "apps/api/src/nfm_db/schemas/vision_extraction.py"
      - "tests/eval/**"
      - ".github/workflows/batch3-extraction-eval.yml"
  workflow_dispatch:
    inputs:
      eval_mode:
        description: "Eval mode (fixture_only, held_out, full)"
        required: false
        default: "fixture_only"
      min_accuracy:
        description: "Minimum accuracy threshold (percent)"
        required: false
        default: "60"

concurrency:
  group: batch3-extraction-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extraction-eval:
    name: Extraction Accuracy Eval (≥60%)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run extraction accuracy evaluation
        run: uv run python ../scripts/eval_extraction_accuracy.py

  extraction-unit-tests:
    name: Extraction Benchmark Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run extraction benchmark unit tests
        run: uv run pytest tests/eval/test_accuracy_benchmark.py -v --tb=short
