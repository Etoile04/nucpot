name: E2E Scheduled Tests

on:
  schedule:
    # Every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  e2e:
    name: E2E Tests (Live — Scheduled)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E periodic tests
        id: e2e
        run: pnpm exec playwright test --project=chromium --grep "@periodic"
        env:
          E2E_TARGET: live
          BASE_URL: https://nucpot.dpdns.org
          API_BASE_URL: https://verify.nucpot.dpdns.org
          CI: true
        continue-on-error: true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-cron-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Create issue on failure
        if: failure() && steps.e2e.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const now = new Date().toISOString();

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['e2e-failure'],
              state: 'open',
            });

            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `⚠️ **E2E tests still failing** at ${now}\n\nCheck the [Playwright report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔴 E2E Tests Failing — ${now.slice(0, 10)}`,
                body: `## E2E Test Failure\n\n**Time**: ${now}\n**Run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n### Action Required\n1. Download the [Playwright report artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n2. Review failed tests and screenshots\n3. Fix or quarantine flaky tests`,
                labels: ['e2e-failure'],
              });
            }

      - name: Send Feishu alert on failure
        if: failure() && steps.e2e.outcome == 'failure'
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

            curl -s -X POST "$WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{
                \"msg_type\": \"interactive\",
                \"card\": {
                  \"header\": {
                    \"title\": { \"tag\": \"plain_text\", \"content\": \"E2E Tests Failed\" },
                    \"template\": \"red\"
                  },
                  \"elements\": [{
                    \"tag\": \"markdown\",
                    \"content\": \"**NucPot E2E cron tests failed**\\nTime: ${TIMESTAMP}\\n[View Run](${RUN_URL})\"
                  }]
                }
              }"
          fi
        env:
          WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK }}

      - name: E2E summary
        if: always()
        run: |
          echo "## E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.e2e.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Report: [Download artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
